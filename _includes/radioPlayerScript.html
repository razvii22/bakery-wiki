<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
<script type="text/javascript" defer>
    const selector = Math.random(),
    chance = Math.random();
    function sideInnit (child) {
        const sidebar = document.getElementById("sideMenu");
        sidebar.appendChild(child);
    };

    function hidePopup () {
        if (!event.target.closest("note")) {
            console.log("gone.")
            let popup = document.getElementById("note");
            popup.remove();
        };
        return true
    };

    function readPostit (index) {
        const secrets = ["minerals", "exodus", "moon", "detonate", "berry", "morons", "warheads"],
        main = document.getElementById("main"),
        postit = document.getElementById("postit"),
        note = document.createElement("dialogue"),
        text = document.createTextNode(secrets[Math.floor(index * secrets.length)]);
        postit.remove()
        note.id = "note";
        note.style = "width: 20vw; height: 200px; position: fixed; top: 40vh; left: 40vw; background-image: url('/wiki/assets/images/backgrounds/note.png'); text-align: center; font-size: 3rem; border: solid black 2px; color: black; font-family: 'Schoolbell', cursive; box-shadow: 0px 0px 100px black";
        note.setAttribute("open", "true");
        note.appendChild(text);
        main.appendChild(note);
        document.addEventListener("mousedown", hidePopup);
    };

    if (chance < 0.1) {document.addEventListener("DOMContentLoaded", function (){
        const postit = document.createElement("img");
        postit.src = "/wiki/assets/images/icons/postit.webp";
        postit.style.width = "40%"
        postit.setAttribute("onclick", "readPostit(selector)");
        postit.id = "postit";
        sideInnit(postit);
    })}
</script>
