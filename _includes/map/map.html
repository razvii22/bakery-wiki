<div id="map-container">
<div id="map"></div>
<script src="{{ '/assets/js/GeoJSON.js' | relative_url }}"></script>
<style>
.leaflet-container {
    background-color: var(--Content);
    width: 100% !important;
    height: 100% !important;
}
#map-container {
    height: 40rem;
}
</style>
<script>
    var rand = Math.floor(Math.random()*10)
    console.log(rand)
    var x = "{{page.x}}"
    var y = "{{page.y}}"
    var whiteIcon = L.icon({
        iconUrl: '{{ "/assets/images/map_markers/Banner_White.png" | relative_url}}',

        iconSize:     [32, 32], // size of the icon
        iconAnchor:   [16, 32], // point of the icon which will correspond to marker's location
    });
    var bottleIcon = L.icon({
        iconUrl: '{{ "/assets/images/map_markers/Glass_Bottle.png" | relative_url}}',

        iconSize:     [16, 16], // size of the icon
        iconAnchor:   [8, 16], // point of the icon which will correspond to marker's location
    });

    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 1,
        maxZoom: 4
    });
    const bounds = L.latLngBounds(
        [0, 0],
        [464, 768]
    );
    var image = L.imageOverlay("{{'assets/images/locations/Full Compound Map.png' | relative_url}}", bounds).addTo(map);
    map.fitBounds(bounds);
    const padded = bounds.pad(0.2)
    map.setMaxBounds(padded)
    if (x&&y) {
        map.setView([y,x],3);
    }

var waypoints = [
    {%- for page in site.pages%}
        {%- if page.x and page.y %}
            {
            "type": "Feature",
            "properties": {
            "name": "{{page.title}}",
            "popupContent": "<a href={{page.url | relative_url}}>{{page.title}}</a>"
            },
            "geometry": {
                "type": "Point",
                "coordinates": [{{page.x}}, {{page.y}}]
            }
            }{%- unless forloop.last %},{% endunless %}
        {%- endif %}
    {%- endfor %}
]

var marker1 = L.marker([50,50],{icon:bottleIcon});

marker1.on("click", () => {window.open("https://www.dropbox.com/scl/fi/6686qsaer2ylksi4ccrle/Recovered-Scanned-Document.pdf?rlkey=zpks6vzmq04tzqzo31du02j7k&st=cqlkiav8&dl=1","_blank")})

if (rand == 1) {
    marker1.addTo(map)
}

var fullWaypoints = GeoJSON.concat(waypoints)

function onEachFeature(feature, layer) {
    if (feature.properties && feature.properties.popupContent) {
        layer.bindPopup(feature.properties.popupContent);
    }
}

function pointToLayer(feature,latlng) {
    return L.marker(latlng, { icon: whiteIcon });
}


L.geoJSON(fullWaypoints, {
    pointToLayer: pointToLayer,
    onEachFeature: onEachFeature
}).addTo(map);

// map.on('click', onMapClick);
</script>
</div>
